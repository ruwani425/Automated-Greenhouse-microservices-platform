spring:
  application:
    name: zone-service

  # Database Configuration (MySQL)
  datasource:
    url: jdbc:mysql://localhost:3306/agms_zone_db?createDatabaseIfNotExist=true
    username: root
    password: Ijse@1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Server Port
server:
  port: 8081

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
